name: hotspot_detection_split_f1_val_temp_1_trial_1
num_workers_generate: 3
num_workers_tune: 3
model:
  model_name: claudeopus46
  api_key_env_var: OPENAI_API_KEY
  api_base: https://apps-test.inside.anl.gov/argoapi/v1
  max_retries: 15
  rate_limit_resend_attempts: 30
  rate_limit_sleep_seconds: 60
workspace:
  root_dir: /data/programs/CVEvolve/workspace/hotspot_detection_split/sandbox
  data_dir: /data/programs/CVEvolve/workspace/hotspot_detection_split/sandbox/test_data
  validation_dir: /data/programs/CVEvolve/workspace/hotspot_detection_split/validation_data
  require_dangerous_command_approval: true
metric:
  name_hint: f1 score
  direction_hint: maximize
  target_value: null
  description_hint: if a detected point is within 40 pixels to a ground truth point, consider that a match. Use this to calculate the f1 score.
branching:
  warmup_rounds: 3
  tune_every: 3
  evolve_every: 2
  min_scored_for_tune: 1
  min_scored_for_evolve: 2
  lineage_selection_temperature: 1
stopping:
  max_rounds: 20
  patience_rounds: 10
  min_improvement: 0.0
tracking:
  enabled: true
  mlflow_tracking_uri: http://164.54.100.181:5000/
  mlflow_experiment_name: CVEvolve