name: hotspot_4x4_binned
num_workers_generate: 3
num_workers_tune: 3
model:
  model_name: claudeopus46
  api_key_env_var: ARGO_API_KEY
  api_base: https://apps.inside.anl.gov/argoapi/v1
  max_retries: 15
  rate_limit_resend_attempts: 30
  rate_limit_sleep_seconds: 60
workspace:
  root_dir: /mnt/c/Users/trobson/OneDrive - Argonne National Laboratory/2026-1_Luo/cvevolve_4x4/sessions
  data_dir: /mnt/c/Users/trobson/OneDrive - Argonne National Laboratory/2026-1_Luo/cvevolve_4x4/test_data
  holdout_data_dir: /mnt/c/Users/trobson/OneDrive - Argonne National Laboratory/2026-1_Luo/cvevolve_4x4/holdout_data
  require_dangerous_command_approval: true
metric:
  name_hint: f1 score
  direction_hint: maximize
  target_value: null
  description_hint: >-
    Per-bin F1 score for Bragg peak detection. A detected point within 40
    pixels of a ground truth point is a match. Compute per-bin F1 and
    average across all validation bins equally.
branching:
  warmup_rounds: 3
  tune_every: 3
  evolve_every: 2
  min_scored_for_tune: 1
  min_scored_for_evolve: 2
  lineage_selection_temperature: 1
stopping:
  max_rounds: 5
  patience_rounds: 2
  min_improvement: 0.0
tracking:
  enabled: false
