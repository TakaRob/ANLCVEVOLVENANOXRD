name: hotspot_1x1_f2
num_workers_generate: 2
num_workers_tune: 2
model:
  model_name: claudeopus46
  api_key_env_var: ARGO_API_KEY
  api_base: https://apps.inside.anl.gov/argoapi/v1
  max_retries: 15
  rate_limit_resend_attempts: 30
  rate_limit_sleep_seconds: 60
workspace:
  root_dir: /mnt/c/Users/trobson/OneDrive - Argonne National Laboratory/2026-1_Luo/cvevolve_1x1/sessions
  data_dir: /mnt/c/Users/trobson/OneDrive - Argonne National Laboratory/2026-1_Luo/cvevolve_1x1/test_data
  holdout_data_dir: /mnt/c/Users/trobson/OneDrive - Argonne National Laboratory/2026-1_Luo/cvevolve_1x1/holdout_data
  require_dangerous_command_approval: true
metric:
  name_hint: f2 score (recall-weighted)
  direction_hint: maximize
  target_value: null
  description_hint: >-
    PRIMARY METRIC: mean per-center-bin F2 score (recall-weighted, beta=2)
    for spatially-validated Bragg peak detection. Ground truth is derived
    from 3x3 annotations mapped to the center 1x1 frame, so it UNDERCOUNTS
    the peaks visible at full 1x1 sensitivity. The PRIMARY GOAL is therefore
    to RECALL all known 3x3 features; extra 1x1 detections are often real and
    must be only lightly penalized, so recall is weighted ~4x precision (F2).
    The algorithm must detect peaks in single-exposure frames, link them
    across spatial neighbors, and verify they follow a Voigt intensity
    profile. A detected point within 40 pixels of a ground truth point is a
    match. Maximize mean F2 across evaluation bins (precision/F1 reported for
    context only). Sensitivity can always be raised later; do not sacrifice
    recall of the 3x3 features to chase precision.
branching:
  warmup_rounds: 3
  tune_every: 3
  evolve_every: 2
  min_scored_for_tune: 1
  min_scored_for_evolve: 2
  lineage_selection_temperature: 1
stopping:
  max_rounds: 25
  patience_rounds: 12
  min_improvement: 0.0
tracking:
  enabled: false
